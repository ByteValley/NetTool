name: Sync Blockads Domestic

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

concurrency:
  group: sync-blockads-domestic
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate domestic module
        run: |
          python3 <<'PY'
          from datetime import datetime, timezone, timedelta
          from pathlib import Path
          from urllib.request import Request, urlopen
          import re

          upstream = "https://raw.githubusercontent.com/thNylHx/Tools/main/Surge/Module/Blockads.sgmodule"
          target = Path("Surge/Module/Purification/Blockads_Domestic.module")
          policy = "境内服务"

          req = Request(upstream, headers={"User-Agent": "Surge"})
          with urlopen(req, timeout=60) as resp:
              body = resp.read().decode("utf-8")

          # 仅替换规则中的策略字段 DIRECT，保留 REJECT、参数与注释不变。
          body = re.sub(r",DIRECT(?=,|$)", f",{policy}", body)

          now = datetime.now(timezone(timedelta(hours=8))).strftime("%Y-%m-%d %H:%M:%S")
          body = body.replace(
              "#!name = Block ads | 软件去广告合集模块",
              "#!name = Block ads | 软件去广告合集模块 | 境内服务版",
              1,
          )
          body = body.replace(
              "#!desc = 常用软件去广告合集",
              "#!desc = 常用软件去广告合集；自动同步上游并将 DIRECT 策略改为「境内服务」",
              1,
          )
          body = body.replace(
              "#!author = RuCu6 Keywos fmz200 可莉🅥 QingRex",
              "#!author = RuCu6 Keywos fmz200 可莉🅥 QingRex / ByteValley Sync",
              1,
          )
          body = re.sub(r"^#!date = .*$", f"#!date = {now}", body, count=1, flags=re.M)

          header = (
              "#\n"
              "# Generated by ByteValley/NetTool GitHub Actions.\n"
              "# Upstream: https://raw.githubusercontent.com/thNylHx/Tools/main/Surge/Module/Blockads.sgmodule\n"
              "# Policy rewrite: DIRECT -> 境内服务\n"
              "#\n"
          )
          body = body.rstrip() + "\n"
          insert_at = body.find("[Rule]")
          if insert_at != -1:
              body = body[:insert_at] + header + body[insert_at:]
          else:
              body = header + body

          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(body, encoding="utf-8", newline="\n")
          PY

      - name: Commit changes
        run: |
          if git diff --quiet -- Surge/Module/Purification/Blockads_Domestic.module; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Surge/Module/Purification/Blockads_Domestic.module
          git commit -m "Sync Blockads Domestic module"
          git push
