name: 字节系净化
description: 按域名精细拦截字节系广告（蛋花/番茄/头条/抖音内嵌），屏蔽开屏/激励/前贴片及埋点，兼容短剧播放，可通过「激励视频」参数调节拦截强度。
compat_arguments:
  激励视频: REJECT-DROP
author: ByteValley
icon: https://gitlab.com/lodepuly/iconlibrary/-/raw/main/App_icon/120px/DragonRead.png
dns: {}
rules:
- host_keyword:
    match: sinfonline
    policy: REJECT-DROP
- domain:
    match: ad.zijieapi.com
    policy: REJECT
- and:
    match:
    - domain_suffix:
        match: zijieapi.com
    - domain_keyword:
        match: ad
    policy: REJECT-DROP
- and:
    match:
    - domain_suffix:
        match: zijieapi.com
    - domain_keyword:
        match: normal-lq
    policy: REJECT-DROP
- and:
    match:
    - domain_suffix:
        match: zijieapi.com
    - domain_keyword:
        match: normal-lf
    policy: REJECT-DROP
mitm:
  hostnames:
    includes:
    - '*.toutiao.com'
